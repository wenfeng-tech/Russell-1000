name: Update Russell 1000 Fundamentals (周五收盘后)

on:
  schedule:
    - cron: '0 22 * * 5'      # 周五 22:00 UTC（北京时间周六 06:00，周五美股收盘后）
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install yfinance supabase pandas
      
      - name: Update Fundamentals
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python fetch_fundamentals.py
